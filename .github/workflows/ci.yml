name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-app-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-app-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit and integration tests with coverage gate
        run: bun run test:coverage -- --reporter=verbose --reporter=github-actions

      - name: Build
        run: bun run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: End-to-end tests
        run: bun run test:e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-coverage
          path: coverage/

  cloud-gateway:
    name: Cloud gateway quality gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloud-gateway

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            cloud-gateway/node_modules
          key: bun-gateway-${{ hashFiles('cloud-gateway/bun.lock') }}
          restore-keys: |
            bun-gateway-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # TODO: add "lint" script to cloud-gateway/package.json to enable this step
      # - name: Lint
      #   run: bun run lint

      - name: Typecheck
        run: bun run build

      - name: Tests with 95% coverage gate
        run: bun run test:coverage
